{% extends "layout_auth.html" %}

{% block title %}Set new password{% endblock %}
{% block heading %}Set a new password{% endblock %}

{% block content %}
<form action="/reset-password" method="post" class="space-y-5">
  <input type="hidden" name="token" value="{{ token }}">
  <div>
    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New password</label>
    <input id="password" name="password" type="password" required autocomplete="new-password"
           minlength="8"
           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent">
    <p class="mt-1 text-xs text-gray-400">At least 8 characters</p>
  </div>
  <button type="submit"
          class="w-full py-2 px-4 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-lg text-sm transition-colors">
    Set new password
  </button>
</form>
{% endblock %}
