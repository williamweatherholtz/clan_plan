{% extends "layout_auth.html" %}

{% block title %}Reset password{% endblock %}
{% block heading %}Reset your password{% endblock %}

{% block content %}
<form action="/forgot-password" method="post" class="space-y-5">
  <p class="text-sm text-gray-600">
    Enter your email address and we'll send you a link to reset your password.
  </p>
  <div>
    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
    <input id="email" name="email" type="email" required autocomplete="email"
           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent">
  </div>
  <button type="submit"
          class="w-full py-2 px-4 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-lg text-sm transition-colors">
    Send reset link
  </button>
</form>
<p class="mt-6 text-center text-sm">
  <a href="/login" class="text-gray-500 hover:text-amber-600">Back to sign in</a>
</p>
{% endblock %}
