{% extends "layout_auth.html" %}

{% block title %}Create account{% endblock %}
{% block heading %}Join the family 🎉{% endblock %}

{% block content %}
<form action="/register" method="post" class="space-y-5">
  <div>
    <label for="display_name" class="block text-sm font-bold text-gray-600 mb-1.5">Your name</label>
    <input id="display_name" name="display_name" type="text" required autocomplete="name"
           placeholder="e.g. Grandma Sue"
           class="w-full px-3 py-2.5 border border-indigo-200 rounded-xl text-sm font-medium bg-indigo-50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-colors">
  </div>
  <div>
    <label for="email" class="block text-sm font-bold text-gray-600 mb-1.5">Email address</label>
    <input id="email" name="email" type="email" required autocomplete="email"
           class="w-full px-3 py-2.5 border border-indigo-200 rounded-xl text-sm font-medium bg-indigo-50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-colors">
  </div>
  <div>
    <label for="password" class="block text-sm font-bold text-gray-600 mb-1.5">Password</label>
    <input id="password" name="password" type="password" required autocomplete="new-password" minlength="8"
           class="w-full px-3 py-2.5 border border-indigo-200 rounded-xl text-sm font-medium bg-indigo-50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-colors">
    <p class="mt-1.5 text-xs text-gray-400 font-medium">At least 8 characters</p>
  </div>
  <div>
    <button type="submit" class="btn-primary w-full py-2.5 px-4 rounded-xl text-sm">
      Create account →
    </button>
  </div>
</form>

{% if google_enabled %}
<div class="mt-5">
  <div class="relative">
    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-indigo-100"></div></div>
    <div class="relative flex justify-center text-xs"><span class="px-2 text-gray-400 font-semibold" style="background:var(--surface)">or</span></div>
  </div>
  <a href="/api/auth/google"
     class="mt-4 flex items-center justify-center w-full py-2.5 px-4 border border-indigo-200 rounded-xl text-sm font-semibold text-gray-700 hover:bg-indigo-50 transition-colors">
    <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </a>
</div>
{% endif %}

<p class="mt-6 text-center text-sm text-gray-500 font-medium">
  Already have an account?
  <a href="/login" class="font-bold text-indigo-600 hover:text-indigo-500 transition-colors">Sign in</a>
</p>
{% endblock %}
