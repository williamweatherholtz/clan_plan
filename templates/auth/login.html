{% extends "layout_auth.html" %}

{% block title %}Sign in{% endblock %}
{% block heading %}Sign in to your account{% endblock %}

{% block content %}
<form action="/login" method="post" class="space-y-5">
  <div>
    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
    <input id="email" name="email" type="email" required autocomplete="email"
           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent">
  </div>
  <div>
    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
    <input id="password" name="password" type="password" required autocomplete="current-password"
           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent">
  </div>
  <div>
    <button type="submit"
            class="w-full py-2 px-4 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-lg text-sm transition-colors">
      Sign in
    </button>
  </div>
</form>

{% if google_enabled %}
<div class="mt-5">
  <div class="relative">
    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
    <div class="relative flex justify-center text-xs"><span class="bg-white px-2 text-gray-400">or</span></div>
  </div>
  <a href="/api/auth/google"
     class="mt-4 flex items-center justify-center w-full py-2 px-4 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
    <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </a>
</div>
{% endif %}

<p class="mt-6 text-center text-sm text-gray-600">
  Don't have an account?
  <a href="/register" class="font-medium text-amber-600 hover:text-amber-500">Register</a>
</p>
<p class="mt-2 text-center text-sm">
  <a href="/forgot-password" class="text-sm text-gray-500 hover:text-amber-600">Forgot password?</a>
</p>
{% endblock %}
