<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Clan Plan{% endblock %} — Clan Plan</title>
  <meta name="theme-color" content="#0D9488">
  <!-- Anti-flash -->
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'system';
      if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/tailwind.css">
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body class="h-full font-sans" style="background:var(--bg)">
  <div id="toast-container"></div>

  <!-- Decorative blobs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
    <div class="absolute -top-24 -right-24 w-80 h-80 rounded-full opacity-[0.07]"
         style="background: radial-gradient(circle, #0D9488, transparent)"></div>
    <div class="absolute -bottom-32 -left-32 w-96 h-96 rounded-full opacity-[0.06]"
         style="background: radial-gradient(circle, #F43F5E, transparent)"></div>
  </div>

  <!-- Theme toggle -->
  <button id="theme-toggle" onclick="cycleTheme()" title="Toggle theme"
          class="fixed top-4 right-4 p-2 rounded-lg text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 transition-colors z-50">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <div class="min-h-full flex flex-col justify-center py-16 sm:px-6 lg:px-8 relative">
    <!-- Wordmark -->
    <div class="sm:mx-auto sm:w-full sm:max-w-sm text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
           style="background: linear-gradient(135deg, #F0FDFA 0%, #99F6E4 100%)">
        <span class="text-3xl">🏕️</span>
      </div>
      <h1 class="font-display text-4xl font-bold leading-none tracking-tight" style="color:var(--primary)">
        Clan Plan
      </h1>
      <p class="mt-2 text-sm font-medium" style="color:var(--muted)">Your family reunion, beautifully organised.</p>
    </div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md relative">
      <h2 class="text-center text-base font-bold text-gray-500 mb-5">{% block heading %}{% endblock %}</h2>

      {% if let Some(f) = flash %}
      <div class="mb-4 px-4 py-3 rounded-xl border text-sm font-semibold
        {% if f.kind == "error" %}bg-rose-50 border-rose-200 text-rose-700
        {% else if f.kind == "success" %}bg-green-50 border-green-200 text-green-700
        {% else %}bg-indigo-50 border-indigo-200 text-indigo-700{% endif %}">
        {{ f.text }}
      </div>
      {% endif %}

      <div class="auth-card py-8 px-6 sm:px-10">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
