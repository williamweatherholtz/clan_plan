<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Clan Plan{% endblock %} — Clan Plan</title>
  <meta name="theme-color" content="#1F4FD6">
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'system';
      if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/tailwind.css">
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body class="h-full font-sans">
  <div id="toast-container"></div>

  <button id="theme-toggle" onclick="cycleTheme()" title="Toggle theme"
          class="fixed top-4 right-4 z-50 text-base px-3 py-1.5 rounded-md transition-colors leading-none"
          style="background: var(--surface); border: 1px solid var(--border);">
    💻
  </button>

  <div class="min-h-full flex flex-col justify-center py-16 sm:px-6 lg:px-8">

    <div class="sm:mx-auto sm:w-full sm:max-w-sm text-center mb-10">
      <h1 class="text-4xl font-bold tracking-tight" style="color: var(--text);">Clan Plan</h1>
      <p class="mt-2 text-base" style="color: var(--muted);">Plan your family reunion in one place.</p>
    </div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md px-4 sm:px-0">
      <h2 class="text-center text-lg font-bold mb-6" style="color: var(--text);">{% block heading %}{% endblock %}</h2>

      {% if let Some(f) = flash %}
      <div class="mb-4 banner
        {% if f.kind == "error" %}banner-danger
        {% else if f.kind == "success" %}banner-success
        {% else %}{% endif %}">
        <div class="flex-1 text-sm font-medium" style="color: var(--text);">{{ f.text }}</div>
      </div>
      {% endif %}

      <div class="auth-card">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
