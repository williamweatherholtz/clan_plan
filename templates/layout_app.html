<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Clan Plan{% endblock %} — Clan Plan</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/favicon.svg">
  <meta name="theme-color" content="#0D9488">
  <!-- Anti-flash -->
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'system';
      if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <!-- Fonts: Plus Jakarta Sans (display) + Nunito (UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/tailwind.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body class="min-h-full font-sans" style="background:var(--bg)">
  <div id="toast-container"></div>

  <!-- ── Navigation ────────────────────────────────────────────────────── -->
  <nav class="app-nav sticky top-0 z-40" x-data="{ mobileOpen: false }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-14">

        <!-- Logo + breadcrumb -->
        <div class="flex items-center gap-3 min-w-0 flex-1">
          <a href="/dashboard" class="nav-logo flex items-center gap-2 text-xl leading-none select-none flex-shrink-0">
            <span class="text-lg">🏕️</span>
            <span>Clan Plan</span>
          </a>
          {% block breadcrumb %}{% endblock %}
        </div>

        <!-- Right side -->
        <div class="flex items-center gap-1">
          <!-- Theme toggle -->
          <button id="theme-toggle" onclick="cycleTheme()" title="Toggle theme"
                  class="p-2 rounded-lg text-gray-400 hover:text-indigo-500 hover:bg-indigo-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>


          <!-- User menu -->
          <div class="relative" x-data="{ open: false }">
            <button @click="open = !open"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-semibold text-gray-600 hover:text-indigo-700 hover:bg-indigo-50 transition-colors focus:outline-none">
              <span class="hidden sm:block">{{ user_name }}</span>
              <svg class="w-3.5 h-3.5 text-gray-400 transition-transform" :class="open ? 'rotate-180' : ''" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
              </svg>
            </button>
            <div x-show="open" @click.away="open = false" x-cloak
                 class="absolute right-0 mt-1.5 w-48 bg-white rounded-xl shadow-picnic-lg border border-indigo-100 py-1.5 z-50">
              <a href="/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition-colors rounded-lg mx-1">Profile</a>
              <a href="/dashboard" class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition-colors rounded-lg mx-1">Reunions</a>
              {% if is_sysadmin %}
              <a href="/admin" class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition-colors rounded-lg mx-1">Admin Panel</a>
              {% endif %}
              <hr class="my-1 border-indigo-50">
              <button onclick="apiFetch('POST','/auth/logout').catch(()=>{}).finally(()=>{ window.location.href='/login'; })"
                      class="w-full text-left px-4 py-2 text-sm text-rose-600 hover:bg-rose-50 transition-colors rounded-lg mx-1">
                Sign out
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </nav>

  <!-- Flash message -->
  {% if let Some(f) = flash %}
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-4">
    <div class="px-4 py-3 rounded-xl border text-sm font-semibold
      {% if f.kind == "error" %}bg-rose-50 border-rose-200 text-rose-700
      {% else if f.kind == "success" %}bg-green-50 border-green-200 text-green-700
      {% else %}bg-indigo-50 border-indigo-200 text-indigo-700{% endif %}">
      {{ f.text }}
    </div>
  </div>
  {% endif %}

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <script src="/assets/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
