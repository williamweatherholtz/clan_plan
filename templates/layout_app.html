<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Clan Plan{% endblock %} — Clan Plan</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/favicon.svg">
  <meta name="theme-color" content="#1F4FD6">
  <!-- Anti-flash -->
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'system';
      if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <!-- Atkinson Hyperlegible: designed for clarity -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/tailwind.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body class="min-h-full font-sans">
  <div id="toast-container"></div>

  <!-- ── Top bar ────────────────────────────────────────────────────────── -->
  <nav class="app-nav sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center h-14 gap-6">

        <a href="/dashboard" class="nav-logo flex-shrink-0">Clan Plan</a>

        {% block breadcrumb %}{% endblock %}

        <div class="flex-1"></div>

        <!-- Theme toggle -->
        <button onclick="cycleTheme()" title="Toggle theme"
                class="text-sm font-bold px-3 py-1.5 rounded-md border border-line hover:bg-wash transition-colors"
                style="border-color: var(--border); color: var(--text);">
          <span class="hidden sm:inline">Theme</span>
          <svg class="w-4 h-4 inline sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>

        <!-- User menu -->
        <div class="relative" x-data="{ open: false }">
          <button @click="open = !open"
                  class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm font-bold transition-colors focus:outline-none hover:bg-wash"
                  style="color: var(--text);">
            <span class="hidden sm:inline">{{ user_name }}</span>
            <svg class="w-3.5 h-3.5 transition-transform" :class="open ? 'rotate-180' : ''" fill="currentColor" viewBox="0 0 20 20" style="color: var(--muted-2);">
              <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
            </svg>
          </button>
          <div x-show="open" @click.away="open = false" x-cloak
               class="absolute right-0 mt-2 w-48 rounded-md py-1 z-50"
               style="background: var(--surface); border: 1px solid var(--border-2); box-shadow: 0 4px 16px rgba(15,23,42,.08);">
            <a href="/profile" class="block px-4 py-2 text-sm font-bold rounded-md mx-1 hover:bg-wash transition-colors" style="color: var(--text);">Profile</a>
            <a href="/dashboard" class="block px-4 py-2 text-sm font-bold rounded-md mx-1 hover:bg-wash transition-colors" style="color: var(--text);">Reunions</a>
            {% if is_sysadmin %}
            <a href="/admin" class="block px-4 py-2 text-sm font-bold rounded-md mx-1 hover:bg-wash transition-colors" style="color: var(--text);">Admin</a>
            {% endif %}
            <hr class="my-1" style="border-color: var(--border-2);">
            <button onclick="apiFetch('POST','/auth/logout').catch(()=>{}).finally(()=>{ window.location.href='/login'; })"
                    class="w-full text-left px-4 py-2 text-sm font-bold rounded-md mx-1 hover:bg-wash transition-colors"
                    style="color: var(--danger);">
              Sign out
            </button>
          </div>
        </div>

      </div>
    </div>
  </nav>

  <!-- ── Flash banner ───────────────────────────────────────────────────── -->
  {% if let Some(f) = flash %}
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-4">
    <div class="banner
      {% if f.kind == "error" %}banner-danger
      {% else if f.kind == "success" %}banner-success
      {% else %}{% endif %}">
      <div class="flex-1 text-sm font-medium" style="color: var(--text);">{{ f.text }}</div>
    </div>
  </div>
  {% endif %}

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    {% block content %}{% endblock %}
  </main>

  <script src="/assets/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
