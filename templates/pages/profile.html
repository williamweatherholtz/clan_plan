{% extends "layout_app.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="max-w-lg">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Your Profile</h1>
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <p class="text-gray-900">{{ email }}</p>
    </div>
    <form action="/profile" method="post" class="space-y-4">
      <div>
        <label for="display_name" class="block text-sm font-medium text-gray-700 mb-1">Display name</label>
        <input id="display_name" name="display_name" type="text" required
               value="{{ display_name }}"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
      </div>
      <div>
        <label for="avatar_url" class="block text-sm font-medium text-gray-700 mb-1">Avatar URL (optional)</label>
        <input id="avatar_url" name="avatar_url" type="url"
               value="{{ avatar_url }}"
               placeholder="https://example.com/photo.jpg"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        <p class="mt-1 text-xs text-gray-400">Leave blank to clear avatar</p>
      </div>
      <div>
        <button type="submit"
                class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white text-sm font-semibold rounded-lg transition-colors">
          Save changes
        </button>
      </div>
    </form>
  </div>

  <div class="mt-6 bg-white rounded-xl border border-gray-100 shadow-sm p-6">
    <h2 class="font-semibold text-gray-900 mb-4">Change password</h2>
    <form action="/profile/password" method="post" class="space-y-4">
      <div>
        <label for="current_password" class="block text-sm font-medium text-gray-700 mb-1">Current password</label>
        <input id="current_password" name="current_password" type="password" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
      </div>
      <div>
        <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">New password</label>
        <input id="new_password" name="new_password" type="password" required minlength="8"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
      </div>
      <button type="submit"
              class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white text-sm font-semibold rounded-lg transition-colors">
        Update password
      </button>
    </form>
  </div>
</div>
{% endblock %}
