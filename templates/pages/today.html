{% extends "layout_reunion.html" %}

{% block title %}Today — {{ reunion.title }}{% endblock %}

{% block reunion_content %}
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Today's Schedule</h1>
    <p class="text-sm text-gray-500 mt-0.5">Live view · updates every 30 seconds</p>
  </div>
  <div class="flex items-center gap-3">
    <span id="sse-status" class="inline-flex items-center gap-1.5 text-xs text-green-600 font-medium">
      <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> Live
    </span>
    <label class="flex items-center gap-1.5 text-xs text-gray-500 cursor-pointer select-none">
      <input type="checkbox" id="use24h" onchange="toggle24h(this.checked)">
      24h
    </label>
  </div>
</div>

<div id="today-content" class="space-y-3">
  <div class="text-center py-8 text-gray-400">
    <div class="animate-spin inline-block w-5 h-5 border-2 border-indigo-400 border-t-transparent rounded-full mb-2"></div>
    <p class="text-sm">Loading today's schedule…</p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  startTodaySSE('{{ reunion.id }}');
  initTodayCheckbox();
</script>
{% endblock %}
