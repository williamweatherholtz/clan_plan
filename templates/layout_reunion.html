{% extends "layout_app.html" %}

{% block breadcrumb %}
<span class="hidden sm:inline mx-1" style="color: var(--muted-2);">/</span>
<a href="{% if let Some(s) = reunion.slug %}/r/{{ s }}{% else %}/reunions/{{ reunion.id }}{% endif %}"
   class="text-sm font-bold truncate max-w-[7rem] sm:max-w-[14rem]"
   style="color: var(--muted);">
  {{ reunion.title }}
</a>
{% if tab_label != "Overview" %}
<span class="hidden sm:inline mx-1" style="color: var(--muted-2);">/</span>
<span class="text-sm font-bold" style="color: var(--text);">{{ tab_label }}</span>
{% endif %}
{% endblock %}

{% block content %}
<!-- ── Flat tab bar — most-used pages first ─────────────────────────────── -->
<div class="mb-8 overflow-x-auto" style="border-bottom: 1px solid var(--border-2);">
  <div class="flex items-center gap-6 sm:gap-8 min-w-max">
    {% for tab in tabs %}
    <a href="{% if let Some(s) = reunion.slug %}/r/{{ s }}{% if !tab.path.is_empty() %}/{{ tab.path }}{% endif %}{% else %}{% if tab.path.is_empty() %}/reunions/{{ reunion.id }}{% else %}/reunions/{{ reunion.id }}/{{ tab.path }}{% endif %}{% endif %}"
       class="{% if tab.active %}tab-active{% else %}tab-inactive{% endif %} whitespace-nowrap">
      {{ tab.label }}
    </a>
    {% endfor %}
  </div>
</div>

{% block reunion_content %}{% endblock %}
{% endblock %}
