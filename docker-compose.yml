services:

  app:
    image: ${APP_IMAGE:-clanplan:latest}
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file: .env
    environment:
      # Override DB host to use the compose service name
      DATABASE_URL: postgres://clanplan:${POSTGRES_PASSWORD:-clanplan}@db:5432/clanplan
      MEDIA_STORAGE_PATH: /data/media
    volumes:
      - media_data:/data/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clanplan
      POSTGRES_USER: clanplan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clanplan}
    # No port mapping in production — app container reaches db by service name.
    # For local tooling access, use docker-compose.dev.yml override.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clanplan -d clanplan"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Mailpit (dev-only) has been moved to docker-compose.dev.yml

volumes:
  postgres_data:
  media_data:
