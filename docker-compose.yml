services:

  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file: .env
    environment:
      # Override DB host to use the compose service name
      DATABASE_URL: postgres://familyer:${POSTGRES_PASSWORD:-familyer}@db:5432/familyer
      MEDIA_STORAGE_PATH: /data/media
    volumes:
      - media_data:/data/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: familyer
      POSTGRES_USER: familyer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-familyer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familyer -d familyer"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Dev-only mail catcher — remove or comment out for production.
  # Web UI at http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
